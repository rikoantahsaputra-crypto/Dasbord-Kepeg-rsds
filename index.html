<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dashboard Layanan Kepegawaian</title>

<style>
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:linear-gradient(135deg,#0f172a,#1e293b);
  color:white;
}

header{
  padding:20px;
  text-align:center;
  font-size:22px;
  font-weight:600;
}

.container{
  max-width:1100px;
  margin:auto;
  padding:20px;
}

input,select{
  padding:10px;
  border-radius:8px;
  border:none;
  margin:5px 0;
  width:100%;
}

button{
  padding:10px 15px;
  border:none;
  border-radius:8px;
  background:#3b82f6;
  color:white;
  cursor:pointer;
  font-weight:600;
}

button:hover{
  background:#2563eb;
}

.card{
  background:#1e293b;
  padding:15px;
  border-radius:12px;
  margin-top:10px;
}

.table{
  width:100%;
  border-collapse:collapse;
  margin-top:10px;
}

.table th,.table td{
  padding:8px;
  border-bottom:1px solid #334155;
  font-size:14px;
}

.table th{
  background:#0f172a;
}

.hidden{
  display:none;
}
</style>
</head>

<body>

<header>Dashboard Layanan Kepegawaian</header>

<div class="container">

<div class="card">
  <input type="email" id="email" placeholder="Masukkan Email Anda">
  <button onclick="loadLayanan()">Masuk</button>
  <div id="msg"></div>
</div>

<div class="card hidden" id="main">
  <select id="layananSelect"></select>
  <button onclick="loadData()">Tampilkan Data</button>
  <div id="result"></div>
</div>

</div>

<script>

const API = "https://script.google.com/macros/s/AKfycbyzv6aJyQIFoWgg6CalLBl7738_QKt_HpUE8uS-yiXLS75foi3nOSw08Djj2zG_IeCGPA/exec";

let userEmail = "";

function loadLayanan(){

  userEmail = document.getElementById("email").value.trim();

  if(!userEmail){
    alert("Email wajib diisi");
    return;
  }

  fetch(`${API}?action=list&email=${userEmail}`)
  .then(res=>res.json())
  .then(data=>{

    if(data.error){
      document.getElementById("msg").innerHTML =
        "<span style='color:red'>"+data.error+"</span>";
      return;
    }

    const select = document.getElementById("layananSelect");
    select.innerHTML="";

    data.forEach(l=>{
      const opt=document.createElement("option");
      opt.value=l;
      opt.textContent=l;
      select.appendChild(opt);
    });

    document.getElementById("main").classList.remove("hidden");
    document.getElementById("msg").innerHTML="";
  });
}

function loadData(){

  const layanan = document.getElementById("layananSelect").value;

  fetch(`${API}?action=data&layanan=${layanan}&email=${userEmail}`)
  .then(res=>res.json())
  .then(data=>{

    if(data.error){
      alert(data.error);
      return;
    }

    let html="<table class='table'><tr><th>Nama</th><th>NIP</th><th>Jabatan</th><th>Gol</th></tr>";

    data.forEach(d=>{
      html+=`<tr>
        <td>${d.nama}</td>
        <td>${d.nip}</td>
        <td>${d.jabatan}</td>
        <td>${d.gol}</td>
      </tr>`;
    });

    html+="</table>";

    document.getElementById("result").innerHTML=html;
  });
}

</script>

</body>
</html>
