<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dashboard Layanan Kepegawaian</title>

<style>
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:#f1f5f9;
}

header{
  padding:20px;
  background:#0f172a;
  color:white;
  text-align:center;
  font-size:20px;
  font-weight:600;
}

.container{
  max-width:1100px;
  margin:auto;
  padding:20px;
}

input,select{
  padding:10px;
  border-radius:8px;
  border:1px solid #cbd5e1;
  margin:5px 0;
  width:100%;
}

button{
  padding:8px 12px;
  border:none;
  border-radius:8px;
  background:#2563eb;
  color:white;
  cursor:pointer;
  font-weight:600;
}

button:hover{
  background:#1d4ed8;
}

.card{
  background:white;
  padding:15px;
  border-radius:14px;
  margin-top:15px;
  box-shadow:0 4px 15px rgba(0,0,0,0.05);
}

.card h3{
  margin:0 0 5px 0;
  font-size:16px;
}

.label{
  font-size:12px;
  color:#64748b;
}

.field{
  margin-top:6px;
}

.folder-link{
  color:#2563eb;
  font-weight:600;
  text-decoration:none;
}

.folder-link:hover{
  text-decoration:underline;
}

.hidden{
  display:none;
}
</style>
</head>

<body>

<header>Dashboard Layanan Kepegawaian</header>

<div class="container">

<div class="card">
  <input type="email" id="email" placeholder="Masukkan Email Anda">
  <button onclick="loadLayanan()">Masuk</button>
  <div id="msg"></div>
</div>

<div class="card hidden" id="main">
  <select id="layananSelect"></select>
  <button onclick="loadData()">Tampilkan</button>
</div>

<div id="result"></div>

</div>

<script>

const API = "https://script.google.com/macros/s/AKfycbx_HKC6kaNhTSCAXdIup7021eKvT9OhXAQW7BMnKWMHxq5Up0SaNKcvPpiTiAJ1mDv8fg/exec";
let userEmail="";

function loadLayanan(){

  userEmail=document.getElementById("email").value.trim();
  if(!userEmail){ alert("Email wajib"); return; }

  fetch(`${API}?action=list&email=${userEmail}`)
  .then(res=>res.json())
  .then(data=>{
    if(data.error){
      document.getElementById("msg").innerHTML="<span style='color:red'>"+data.error+"</span>";
      return;
    }

    const select=document.getElementById("layananSelect");
    select.innerHTML="";
    data.forEach(l=>{
      const opt=document.createElement("option");
      opt.value=l;
      opt.textContent=l;
      select.appendChild(opt);
    });

    document.getElementById("main").classList.remove("hidden");
  });
}

function loadData(){

  const layanan=document.getElementById("layananSelect").value;

  fetch(`${API}?action=data&layanan=${layanan}&email=${userEmail}`)
  .then(res=>res.json())
  .then(data=>{

    if(data.error){ alert(data.error); return; }

    let html="";

    data.forEach(d=>{

      html+=`
      <div class="card">
        <h3>${d.nama}</h3>
        <div class="field"><span class="label">NIP</span><br>${d.nip || "-"}</div>
        <div class="field"><span class="label">Jabatan</span><br>${d.jabatan || "-"}</div>
        <div class="field"><span class="label">Golongan</span><br>${d.gol || "-"}</div>
        <div class="field"><span class="label">Folder</span><br>
          ${d.folder ? `<a class="folder-link" href="${d.folder}" target="_blank">Buka Folder</a>` : "-"}
        </div>
        <div class="field">
          <span class="label">Catatan</span><br>
          <input type="text" value="${d.catatan || ""}" 
            onchange="saveCatatan('${layanan}',${d.row},this.value)">
        </div>
      </div>
      `;
    });

    document.getElementById("result").innerHTML=html;

  });
}

function saveCatatan(layanan,row,value){

  const formData = new FormData();
  formData.append("email",userEmail);
  formData.append("layanan",layanan);
  formData.append("row",row);
  formData.append("field","catatan");
  formData.append("value",value);

  fetch(API,{
    method:"POST",
    body:formData
  })
  .then(res=>res.json())
  .then(data=>{
    if(data.error){
      alert(data.error);
    }
  });
}

</script>

</body>
</html>
